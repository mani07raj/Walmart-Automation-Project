# ExtentReports Cucumber7 Adapter Configuration
# Author: Maniraj

extent.reporter.spark.start=true
extent.reporter.spark.out=target/reports/SparkReport.html
extent.reporter.spark.config=src/test/resources/extent-config.xml
extent.reporter.spark.base64imagesrc=true

basefolder.name=target/reports/
basefolder.datetimepattern=yyyy/MMM yyyy/dd-MMM-yyyy/d MMM yy_hh-mm-ss a

extent.reporter.spark.vieworder=test,dashboard,category,exception,author,device,log

cucumber.publish.quiet=true
